<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Débit - Test Fonctionnel</title>
    
    <!-- Tailwind CSS pour le design (chargé via CDN pour éviter toute installation) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel pour lire le code React (JSX). Version fixée pour éviter les erreurs d'import. -->
    <script src="https://unpkg.com/@babel/standalone@7.23.4/babel.min.js"></script>

    <!-- Configuration de Tailwind pour les couleurs personnalisées si besoin -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <!-- C'est ici que l'application React va s'injecter -->
    <div id="root"></div>

    <!-- L'attribut data-type="module" empêche les erreurs liées aux modules de l'environnement -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect } = window.React;

        // --- Composants d'icônes (remplacent lucide-react pour un fichier 100% autonome) ---
        const IconCalculator = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
        );
        const IconActivity = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        );
        const IconBox = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        );
        const IconTimer = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></svg>
        );
        const IconRotateCcw = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );

        // --- Application Principale ---
        function App() {
            const [deltaP, setDeltaP] = useState('');
            const [volume, setVolume] = useState('');
            const [temps, setTemps] = useState('');
            const [debit, setDebit] = useState(null);
            const [rawDebit, setRawDebit] = useState(null);

            useEffect(() => {
                // Remplacement de la virgule par un point pour la saisie française
                const p = parseFloat(deltaP.replace(',', '.'));
                const v = parseFloat(volume.replace(',', '.'));
                const t = parseFloat(temps.replace(',', '.'));

                if (!isNaN(p) && !isNaN(v) && !isNaN(t)) {
                    if (t === 0) {
                        setDebit('Erreur: Temps = 0');
                        setRawDebit(null);
                    } else {
                        const result = (p * v * 60) / t;
                        setRawDebit(result);
                        setDebit(result.toLocaleString('fr-FR', { maximumFractionDigits: 4 })); 
                    }
                } else {
                    setDebit(null);
                    setRawDebit(null);
                }
            }, [deltaP, volume, temps]);

            const handleReset = () => {
                setDeltaP('');
                setVolume('');
                setTemps('');
                setRawDebit(null);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                        
                        {/* En-tête */}
                        <div className="bg-blue-600 p-6 text-white text-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-blue-500 rounded-full opacity-50 blur-2xl"></div>
                            <div className="relative z-10 flex flex-col items-center">
                                <div className="bg-blue-500/50 p-3 rounded-xl mb-3 backdrop-blur-sm shadow-sm">
                                    <IconCalculator size={28} className="text-white" />
                                </div>
                                <h1 className="text-2xl font-bold tracking-tight">Test Fonctionnel</h1>
                                <p className="text-blue-100 text-sm mt-1 font-medium">Calcul du débit de la cuve</p>
                            </div>
                        </div>

                        <div className="p-6 space-y-6">
                            {/* Rappel de la formule */}
                            <div className="bg-slate-50 rounded-xl p-4 border border-slate-100 text-center shadow-inner">
                                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Formule utilisée</span>
                                <div className="font-mono text-sm text-slate-700 flex items-center justify-center">
                                    <span>Débit = </span>
                                    <div className="flex flex-col items-center mx-2">
                                        <span className="border-b border-slate-400 px-2 pb-1">ΔP × Vol × 60</span>
                                        <span className="pt-1 px-2">Temps</span>
                                    </div>
                                </div>
                            </div>

                            {/* Formulaire de saisie */}
                            <div className="space-y-4">
                                <div>
                                    <label className="flex items-center text-sm font-medium text-slate-700 mb-1.5">
                                        <IconActivity size={16} className="mr-2 text-blue-500" />
                                        Différence de pression (ΔP)
                                    </label>
                                    <div className="relative">
                                        <input
                                            type="number"
                                            step="any"
                                            inputMode="decimal"
                                            value={deltaP}
                                            onChange={(e) => setDeltaP(e.target.value)}
                                            placeholder="Ex: 1.5"
                                            className="w-full pl-4 pr-16 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow outline-none"
                                        />
                                        <span className="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 font-medium select-none pointer-events-none">
                                            bar
                                        </span>
                                    </div>
                                </div>

                                <div>
                                    <label className="flex items-center text-sm font-medium text-slate-700 mb-1.5">
                                        <IconBox size={16} className="mr-2 text-indigo-500" />
                                        Volume de la cuve
                                    </label>
                                    <div className="relative">
                                        <input
                                            type="number"
                                            step="any"
                                            inputMode="decimal"
                                            value={volume}
                                            onChange={(e) => setVolume(e.target.value)}
                                            placeholder="Ex: 10"
                                            className="w-full pl-4 pr-16 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow outline-none"
                                        />
                                        <span className="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 font-medium select-none pointer-events-none">
                                            m³
                                        </span>
                                    </div>
                                </div>

                                <div>
                                    <label className="flex items-center text-sm font-medium text-slate-700 mb-1.5">
                                        <IconTimer size={16} className="mr-2 text-teal-500" />
                                        Temps
                                    </label>
                                    <div className="relative">
                                        <input
                                            type="number"
                                            step="any"
                                            inputMode="decimal"
                                            value={temps}
                                            onChange={(e) => setTemps(e.target.value)}
                                            placeholder="Ex: 5"
                                            className="w-full pl-4 pr-16 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-shadow outline-none"
                                        />
                                        <span className="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 font-medium select-none pointer-events-none">
                                            min
                                        </span>
                                    </div>
                                </div>
                            </div>

                            {/* Zone de Résultat */}
                            <div className={`mt-8 relative overflow-hidden rounded-2xl p-6 transition-all duration-300 ${debit ? 'bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 shadow-sm' : 'bg-slate-50 border border-slate-100'}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider">Résultat Moyen</h3>
                                    {debit && (
                                        <button 
                                            onClick={handleReset}
                                            className="text-slate-400 hover:text-slate-600 transition-colors p-1"
                                            title="Réinitialiser"
                                        >
                                            <IconRotateCcw size={16} />
                                        </button>
                                    )}
                                </div>
                                
                                <div className="flex items-baseline">
                                    {debit ? (
                                        <>
                                            <span className="text-4xl font-extrabold text-blue-600 tracking-tight">{debit}</span>
                                            {debit !== 'Erreur: Temps = 0' && (
                                                <span className="ml-2 text-lg font-semibold text-blue-400">m³/h</span>
                                            )}
                                        </>
                                    ) : (
                                        <span className="text-xl font-medium text-slate-300">En attente des données...</span>
                                    )}
                                </div>

                                {rawDebit !== null && (
                                    <div className="mt-6 pt-5 border-t border-blue-200/60 space-y-3">
                                        <h4 className="text-xs font-bold text-blue-800/60 uppercase tracking-wider">Conversions automatiques</h4>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-white/80 p-3 rounded-xl border border-blue-100 shadow-sm">
                                                <span className="block text-[11px] font-semibold text-slate-500 mb-0.5 uppercase">Litres / min</span>
                                                <span className="font-bold text-slate-700 text-lg">{((rawDebit * 1000) / 60).toLocaleString('fr-FR', { maximumFractionDigits: 2 })} <span className="text-sm font-medium text-slate-400">L/min</span></span>
                                            </div>
                                            <div className="bg-white/80 p-3 rounded-xl border border-blue-100 shadow-sm">
                                                <span className="block text-[11px] font-semibold text-slate-500 mb-0.5 uppercase">Litres / heure</span>
                                                <span className="font-bold text-slate-700 text-lg">{(rawDebit * 1000).toLocaleString('fr-FR', { maximumFractionDigits: 2 })} <span className="text-sm font-medium text-slate-400">L/h</span></span>
                                            </div>
                                            <div className="bg-white/80 p-3 rounded-xl border border-blue-100 shadow-sm">
                                                <span className="block text-[11px] font-semibold text-slate-500 mb-0.5 uppercase">Mètres cubes / min</span>
                                                <span className="font-bold text-slate-700 text-lg">{(rawDebit / 60).toLocaleString('fr-FR', { maximumFractionDigits: 4 })} <span className="text-sm font-medium text-slate-400">m³/min</span></span>
                                            </div>
                                            <div className="bg-white/80 p-3 rounded-xl border border-blue-100 shadow-sm">
                                                <span className="block text-[11px] font-semibold text-slate-500 mb-0.5 uppercase">Litres / sec</span>
                                                <span className="font-bold text-slate-700 text-lg">{((rawDebit * 1000) / 3600).toLocaleString('fr-FR', { maximumFractionDigits: 3 })} <span className="text-sm font-medium text-slate-400">L/s</span></span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
